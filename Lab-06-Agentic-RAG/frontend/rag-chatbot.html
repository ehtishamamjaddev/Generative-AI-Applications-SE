<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAG Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { width: 780px; background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); overflow: hidden; display: flex; flex-direction: column; height: 90vh; }
  .header { background: #1a3a8f; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 10px; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .action-bar { display: flex; gap: 8px; padding: 10px 16px; background: #f8f9ff; border-bottom: 1px solid #e0e4f0; }
  .action-bar button { padding: 7px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.2s; }
  .btn-health { background: #22c55e; color: white; }
  .btn-ingest { background: #3b82f6; color: white; }
  .btn-clear  { background: #e5e7eb; color: #374151; }
  .action-bar button:hover { opacity: 0.85; }
  .chat-window { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 85%; }
  .msg.user { align-self: flex-end; }
  .msg.bot  { align-self: flex-start; }
  .bubble { padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
  .msg.user .bubble { background: #1a3a8f; color: white; border-bottom-right-radius: 4px; }
  .msg.bot  .bubble { background: #f1f3f9; color: #1f2937; border-bottom-left-radius: 4px; }
  .msg.system .bubble { background: #fef9c3; color: #713f12; border-radius: 10px; font-size: 13px; }
  .tools-badge { display: inline-block; margin-top: 6px; padding: 3px 10px; background: #dbeafe; color: #1d4ed8; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .trace-panel { margin-top: 10px; border: 1px solid #e0e4f0; border-radius: 10px; overflow: hidden; }
  .trace-header { background: #f1f5f9; padding: 8px 12px; font-size: 13px; font-weight: 600; cursor: pointer; color: #475569; display: flex; justify-content: space-between; }
  .trace-body { padding: 10px 14px; font-size: 12px; color: #374151; display: none; }
  .trace-body.open { display: block; }
  .trace-step { background: #f8fafc; border-left: 3px solid #3b82f6; padding: 8px 10px; margin-bottom: 8px; border-radius: 4px; }
  .trace-step strong { color: #1d4ed8; }
  .citation-card { margin-top: 6px; padding: 8px 12px; background: #eff6ff; border-left: 3px solid #3b82f6; border-radius: 6px; font-size: 12px; color: #1e3a5f; }
  .thinking { color: #6b7280; font-style: italic; font-size: 13px; padding: 10px 14px; }
  .input-bar { display: flex; gap: 8px; padding: 14px 16px; border-top: 1px solid #e0e4f0; background: white; }
  .input-bar input { flex: 1; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .input-bar input:focus { border-color: #1a3a8f; }
  .input-bar button { padding: 10px 22px; background: #1a3a8f; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .input-bar button:hover { background: #1e40af; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span style="font-size:22px">🤖</span>
    <h1>RAG Chatbot — Agentic AI (Lab 06)</h1>
  </div>
 
  <div class="action-bar">
    <button class="btn-health" onclick="checkHealth()">🟢 Health</button>
    <button class="btn-ingest" onclick="ingestPDF()">📄 Ingest PDF</button>
    <button class="btn-clear"  onclick="clearChat()">🗑 Clear Chat</button>
  </div>
 
  <div class="chat-window" id="chatWindow">
    <div class="msg system"><div class="bubble">👋 Welcome! Click <strong>Health</strong> to check the server, then <strong>Ingest PDF</strong> to load the knowledge base. Then start chatting!</div></div>
  </div>
 
  <div class="input-bar">
    <input type="text" id="questionInput" placeholder="Ask a question..." onkeydown="if(event.key==='Enter') sendQuestion()" />
    <button onclick="sendQuestion()">Send</button>
  </div>
</div>
 
<script>
const API = 'http://127.0.0.1:8000';
 
function addMsg(role, html) {
  const win = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="bubble">${html}</div>`;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
  return div;
}
 
function addSystem(html) {
  const win = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `<div class="bubble">${html}</div>`;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
  return div;
}
 
async function checkHealth() {
  const msg = addSystem('⏳ Checking server health...');
  try {
    const res = await fetch(`${API}/health`);
    const d = await res.json();
    msg.querySelector('.bubble').innerHTML =
      `✅ <strong>Health OK</strong><br>
       🧠 LLM: ${d.llm_model}<br>
       📐 Embedding: ${d.embedding_model}<br>
       📦 Pinecone Vectors: <strong>${d.pinecone_vectors}</strong><br>
       🌐 Web Search: ${d.web_search_enabled ? '✅ Enabled' : '❌ Disabled (add TAVILY_API_KEY)'}`;
  } catch(e) {
    msg.querySelector('.bubble').innerHTML = `❌ Cannot connect to server. Is uvicorn running on port 8000?`;
  }
}
 
async function ingestPDF() {
  const msg = addSystem('⏳ Ingesting PDF... this may take 30–90 seconds. Please wait.');
  try {
    const res = await fetch(`${API}/ingest`, { method: 'POST' });
    const d = await res.json();
    if (d.status === 'success') {
      msg.querySelector('.bubble').innerHTML =
        `✅ <strong>Ingestion Complete!</strong><br>
         📄 Chunks ingested: <strong>${d.chunks_ingested}</strong><br>
         📑 Pages indexed: <strong>${d.pages_indexed}</strong>`;
    } else {
      msg.querySelector('.bubble').innerHTML = `❌ Ingestion failed: ${JSON.stringify(d)}`;
    }
  } catch(e) {
    msg.querySelector('.bubble').innerHTML = `❌ Error: ${e.message}`;
  }
}

async function postQueryWithTimeout(question, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(`${API}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
      signal: controller.signal
    });
    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`Server error ${res.status}: ${errBody || res.statusText}`);
    }
    return await res.json();
  } finally {
    clearTimeout(timer);
  }
}
 
async function sendQuestion() {
  const input = document.getElementById('questionInput');
  const question = input.value.trim();
  if (!question) return;
  input.value = '';
 
  addMsg('user', question);
  const thinking = addMsg('bot', '<span class="thinking">🤔 Agent is thinking...</span>');
 
  try {
    let d;
    try {
      d = await postQueryWithTimeout(question, 45000);
    } catch (firstErr) {
      if (firstErr.name !== 'AbortError') {
        throw firstErr;
      }
      thinking.querySelector('.bubble').innerHTML = '<span class="thinking">⏳ Taking longer than usual. Retrying once...</span>';
      d = await postQueryWithTimeout(question, 90000);
    }
 
    let html = `<strong>Answer:</strong><br>${d.answer || d.message || JSON.stringify(d)}`;
 
    // Tools used badge
    if (d.tools_used && d.tools_used.length > 0) {
      html += `<br><span class="tools-badge">🔧 Tools: ${d.tools_used.join(', ')}</span>`;
    } else {
      html += `<br><span class="tools-badge" style="background:#dcfce7;color:#166534;">✅ Direct Answer (no tools)</span>`;
    }
 
    // Tool trace panel
    if (d.tool_trace && d.tool_trace.length > 0) {
      const traceId = 'trace_' + Date.now();
      let traceHtml = `<div class="trace-panel">
        <div class="trace-header" onclick="toggleTrace('${traceId}')">
          🔍 Agent Tool Trace (${d.tool_trace.length} step${d.tool_trace.length>1?'s':''}) <span>▼</span>
        </div>
        <div class="trace-body" id="${traceId}">`;
      d.tool_trace.forEach((t, i) => {
        traceHtml += `<div class="trace-step">
          <strong>Step ${i+1}: ${t.tool}</strong><br>
          <em>Input:</em> ${JSON.stringify(t.input)}<br>
          <em>Output:</em> ${t.output_preview}
        </div>`;
      });
      traceHtml += `</div></div>`;
      html += traceHtml;
    }
 
    // Citations
    if (d.citations && d.citations.length > 0) {
      html += `<br><strong>📚 Citations:</strong>`;
      d.citations.forEach(c => {
        html += `<div class="citation-card">Page ${c.page}: ${c.text}</div>`;
      });
    }
 
    thinking.querySelector('.bubble').innerHTML = html;
  } catch(e) {
    if (e.name === 'AbortError') {
      thinking.querySelector('.bubble').innerHTML = '❌ Request timed out. The model may still be processing. Please try again in a few seconds.';
      return;
    }
    thinking.querySelector('.bubble').innerHTML = `❌ Error: ${e.message}`;
  }
}
 
function toggleTrace(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}
 
function clearChat() {
  document.getElementById('chatWindow').innerHTML =
    '<div class="msg system"><div class="bubble">🗑 Chat cleared. Ready for new questions!</div></div>';
}
</script>
</body>
</html>
